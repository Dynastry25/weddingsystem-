<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luxury Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f1ea;
    font-family:'Montserrat',sans-serif;
    overflow:hidden;
}

/* MAIN CARD */

.card{
    position:relative;
    width:540px;
    height:760px;
    background:#faf9f6;
    border:2px solid #caa85d;
    overflow:hidden;
    box-shadow:
        0 20px 50px rgba(0,0,0,0.15),
        inset 0 0 20px rgba(255,255,255,0.8);
}

/* GOLD OUTER FRAME */

.card::before{
    content:'';
    position:absolute;
    inset:25px;
    border:2px solid #d4b16d;
}

/* CENTER CIRCLE */

.circle{
    position:absolute;
    width:430px;
    height:430px;
    background:white;
    border-radius:50%;
    border:5px solid #caa85d;
    top:130px;
    left:50%;
    transform:translateX(-50%);
    z-index:2;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    box-shadow:
        0 10px 25px rgba(0,0,0,0.08),
        inset 0 0 20px rgba(0,0,0,0.03);
}

/* CONTENT */

.content{
    width:80%;
    color:#1e3f3b;
}

.logo{
    width:70px;
    height:70px;
    border:2px solid #1e3f3b;
    border-radius:50%;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    margin-bottom:20px;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:58px;
    line-height:1.1;
    color:#1d4b45;
}

.sub{
    margin-top:10px;
    font-family:'Cinzel',serif;
    letter-spacing:2px;
    font-size:16px;
    color:#333;
}

.invite{
    margin-top:25px;
    font-size:14px;
    letter-spacing:2px;
}

.date{
    margin-top:20px;
    font-size:20px;
    font-weight:700;
}

.date span{
    font-size:70px;
    color:#0c5c54;
}

.location{
    margin-top:20px;
    font-size:14px;
    line-height:1.8;
}

.rsvp{
    margin-top:25px;
    font-weight:bold;
    color:#0c5c54;
}

/* LEAVES */

.leaf{
    position:absolute;
    border-radius:100px;
    z-index:1;
    filter:drop-shadow(0 6px 8px rgba(0,0,0,0.15));
}

/* GREEN LEAVES */

.green1{
    width:110px;
    height:230px;
    background:#0c6159;
    right:40px;
    top:220px;
    transform:rotate(20deg);
    border:3px solid #d4b16d;
}

.green2{
    width:100px;
    height:210px;
    background:#0b5b54;
    right:100px;
    bottom:70px;
    transform:rotate(-15deg);
    border:3px solid #d4b16d;
}

.green3{
    width:90px;
    height:180px;
    background:#0f7368;
    right:20px;
    bottom:130px;
    transform:rotate(25deg);
    border:3px solid #d4b16d;
}

/* GOLD LEAVES */

.gold1{
    width:70px;
    height:180px;
    background:linear-gradient(#e7d3a2,#b28b45);
    left:45px;
    top:200px;
    transform:rotate(-30deg);
}

.gold2{
    width:60px;
    height:160px;
    background:linear-gradient(#f1dfb8,#b6904f);
    left:100px;
    bottom:110px;
    transform:rotate(30deg);
}

.gold3{
    width:65px;
    height:170px;
    background:linear-gradient(#e7d3a2,#b28b45);
    top:70px;
    left:220px;
    transform:rotate(-5deg);
}

/* FLOWER */

.flower{
    position:absolute;
    width:150px;
    height:150px;
    right:90px;
    bottom:180px;
    z-index:3;
}

.petal{
    position:absolute;
    width:70px;
    height:70px;
    background:white;
    border-radius:50%;
    border:2px solid #e2d2a4;
}

.p1{top:0;left:40px;}
.p2{top:40px;left:0;}
.p3{top:40px;right:0;}
.p4{bottom:0;left:40px;}

.center{
    position:absolute;
    width:50px;
    height:50px;
    background:#c59b42;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow:inset 0 0 10px rgba(255,255,255,0.4);
}

/* PEARLS */

.pearl{
    position:absolute;
    width:14px;
    height:14px;
    background:white;
    border-radius:50%;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.pearl1{top:80px;left:90px;}
.pearl2{top:150px;right:70px;}
.pearl3{bottom:120px;left:80px;}
.pearl4{bottom:90px;right:120px;}

/* SMALL GOLD DOTS */

.dot{
    position:absolute;
    width:10px;
    height:10px;
    background:#caa85d;
    border-radius:50%;
}

.dot1{top:100px;right:110px;}
.dot2{bottom:120px;left:140px;}
.dot3{bottom:80px;right:70px;}

</style>
</head>
<body>

<div class="card">

    <!-- Decorative Leaves -->
    <div class="leaf green1"></div>
    <div class="leaf green2"></div>
    <div class="leaf green3"></div>

    <div class="leaf gold1"></div>
    <div class="leaf gold2"></div>
    <div class="leaf gold3"></div>

    <!-- Pearls -->
    <div class="pearl pearl1"></div>
    <div class="pearl pearl2"></div>
    <div class="pearl pearl3"></div>
    <div class="pearl pearl4"></div>

    <!-- Gold Dots -->
    <div class="dot dot1"></div>
    <div class="dot dot2"></div>
    <div class="dot dot3"></div>

    <!-- Flower -->
    <div class="flower">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="center"></div>
    </div>

    <!-- Circle Content -->
    <div class="circle">

        <div class="content">

            <div class="logo">SR</div>

            <div class="names">
                Sabina Robert
            </div>

            <div class="sub">
                COBBINAH & MENSAH
            </div>

            <div class="invite">
                INVITE YOU TO THEIR<br>
                HOLY MATRIMONY
            </div>

            <div class="date">
                AUG <span>30</span>
            </div>

            <div class="location">
                SATURDAY • 10AM GMT<br><br>
                THE MARRIOTTE HOTEL,<br>
                GREATER ACCRA, GHANA
            </div>

            <div class="rsvp">
                RSVP:<br><br>
                +233 5647 78947899<br>
                +233 6467 89979978
            </div>

        </div>

    </div>

</div>

</body>
</html>
